version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rfc2cn-backend
    environment:
      DATABASE_URL: postgres://rfc2cn_user:rfc2cn_password@<external-host>:5432/rfc2cn
      RUST_LOG: info
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rfc2cn-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
